name: Publish to PPA

on:
  push:
    tags:
      - "v*"

jobs:
  ppa:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get install -y devscripts debhelper dh-python \
            python3-all gnupg dput

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Configure gpg-agent for non-interactive passphrase entry
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye

      - name: Create orig tarball
        run: |
          cd ..
          tar --exclude='.git' --exclude='debian' \
            -czf clipvault_1.0.3.orig.tar.gz ClipVault

      - name: Build source package
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Pre-load passphrase into gpg-agent
          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --passphrase-fd 0 --pinentry-mode loopback \
            --sign --output /dev/null /dev/null 2>/dev/null || true
          debuild -S -sa -k"${{ secrets.GPG_KEY_ID }}"

      - name: Upload to Launchpad PPA
        run: |
          dput ppa:jinshah0322/clipvault ../clipvault_*.changes
