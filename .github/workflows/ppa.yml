name: Publish to PPA

on:
  push:
    tags:
      - "v*"

jobs:
  ppa:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get install -y devscripts debhelper dh-python \
            python3-all gnupg dput

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch \
            --passphrase-fd 0 --pinentry-mode loopback \
            --list-secret-keys

      - name: Build source package
        run: |
          debuild -S -sa \
            --no-lintian \
            -k"${{ secrets.GPG_KEY_ID }}" \
            --passphrase-file <(echo "${{ secrets.GPG_PASSPHRASE }}")

      - name: Upload to Launchpad PPA
        run: |
          dput ppa:jinshah0322/clipvault ../clipvault_*.changes
